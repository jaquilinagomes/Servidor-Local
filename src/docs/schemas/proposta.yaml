# schema/proposta.yaml

#  id: string,
#  id_prestacao_servico: string,
#  preco_hora: string,
#  horas_estimadas: string,
#  estado: string,
#  enabled:boolean,
#  created_at: string,
#  updated_at: string

components:
  schemas:
    # schema principal de proposta
    Proposta:
      type: object
      properties:
        id:
          type: integer
          example: 1
        id_prestacao_servico: 
          type: string
          example: 1
        preco_hora:
          type: string
          example: "200"
        horas_estimadas: 
          type: string
          example: "100"
        estado:
          type: string
          example: "pendente, aceito, recusado"
        enabled: 
          type: boolean
          example: true
        created_at:
          type: string
          example: "2022-01-01T00:00:00.000Z"
        updated_at:
          type: string
          example: "2022-01-01T00:00:00.000Z"

    # schema para criar um novo proposta
    CreateProposta:
      type: object
      properties:
        id_prestacao_servico: 
          type: string
          example: 1
        preco_hora:
          type: string
          example: "100"
        horas_estimadas: 
          type: string
          example: "10"
        estado:
          type: string
          example: "pendente, aceito, recusado"
        enabled: 
          type: boolean
          example: true

    # schema generico para sucesso
    PropostaResponseSucess:
      type: object
      properties:
        message:
          type: string
          example: "Proposta criado com sucesso"
        status:
          type: boolean
          example: true
        data:
          type: object
          $ref: "#/components/schemas/Proposta"

    # schema generico de resposta de erro
    PropostaResponseError:
      type: object
      properties:
        message:
          type: string
          example: "Erro ao buscar propostas"
        status:
          type: boolean
          example: false
        data:
          type: object
          properties: null