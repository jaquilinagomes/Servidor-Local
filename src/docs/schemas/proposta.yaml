# schema/proposta.yaml

#  id: string,
#  id_prestacao_servico: string,
#  preco_hora: number,
#  horas_estimadas: number,
#  estado: string,
#  enabled:boolean,
#  created_at: string,
#  updated_at: string

components:
  schemas:
    # schema principal de proposta
    Proposta:
      type: object
      properties:
        id:
          type: string
          example: 1
        id_prestacao_servico: 
          type: integer
          example: 5
        preco_hora:
          type: number
          example: 15.5
        horas_estimadas: 
          type: number
          example: 8
        estado:
          type: string
          example: "pendente, aceite, recusado"
        enabled: 
          type: boolean
          example: true
        created_at:
          type: string
          example: "2022-01-01T00:00:00.000Z"
        updated_at:
          type: string
          example: "2022-01-01T00:00:00.000Z"

    # schema para criar um novo proposta
    CreateProposta:
      type: object
      required:
        - id_prestacao_servico
        - preco_hora
        - horas_estimadas
      properties:
        id_prestacao_servico: 
          type: integer
          example: 5
        preco_hora:
          type: number
          example: 15.5
        horas_estimadas: 
          type: number
          example: 8
        estado:
          type: string
          example: "pendente, aceite, recusado"
        enabled: 
          type: boolean
          example: true

    UpdateProposta:
      type: object
      properties:
        preco_hora:
          type: number
          example: 55.0
        horas_estimadas:
          type: integer
          example: 6
        estado:
          type: string
          example: "aceito"
        enabled:
          type: boolean
          example: true

    AceitarPoposta:
      type: object
      properties:
        status:
          type: string
          example: success
        message:
          type: string
          example: Proposta aceite com sucesso
        data:
          type: object
          properties:
            id:
              type: string
              example: "15"
            id_orcamento:
              type: string
              example: "3"
            id_prestacao_servico:
              type: string
              example: "7"
            estado:
              type: string
              example: Aceite

    # schema generico para sucesso
    PropostaResponseSuccess:
      type: object
      properties:
        message:
          type: string
          example: "Proposta criado com sucesso"
        status:
          type: boolean
          example: true
        data:
          type: object
          $ref: "#/components/schemas/Proposta"

    # schema generico de resposta de erro
    PropostaResponseError:
      type: object
      properties:
        message:
          type: string
          example: "Erro ao buscar propostas"
        status:
          type: boolean
          example: false
        data:
          type: object
          properties: null