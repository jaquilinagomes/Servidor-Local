# schema/orcamento.yaml

# id: string,
# total: number,
# id_utilizadores: integer,
# enabled: boolean,
# created_at: string,
# updated_at: string

components:
  schemas:
    # schema principal de orcamento
    Orcamento:
      type: object
      properties:
        id:
          type: integer
          example: 1
        total: 
          type: number
          example: 400
        id_utilizadores:
          type: string
          example: 10
        enabled: 
          type: boolean
          example: true
        created_at:
          type: string
          example: "2022-01-01T00:00:00.000Z"
        updated_at:
          type: string
          example: "2022-01-01T00:00:00.000Z"

    # schema para criar um novo orcamento
    CreateOrcamento:
      type: object
      properties:
        total: 
          type: number
          example: 400
        id_utilizadores:
          type: string
          example: 10
        enabled:
          type: boolean
          example: true

    CalculateOrcamento:
      type: object
      required:
        - id
      properties:
      id:
        type: integer
        example: 1

    # schema generico para sucesso
    OrcamentoResponseSucess:
      type: object
      properties:
        message:
          type: string
          example: "Orçamento criado com sucesso"
        status:
          type: boolean
          example: true
        data:
          type: object
          $ref: "#/components/schemas/Orcamento"

    # schema generico de resposta de erro
    OrcamentoResponseError:
      type: object
      properties:
        message:
          type: string
          example: "Erro ao buscar orçamentos"
        status:
          type: boolean
          example: false
        data:
          type: object
          properties: null