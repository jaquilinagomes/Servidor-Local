# schema/prestacao-servico.yaml

paths:
  /prestacao-servico:
    get:
      summary: Listar todas as prestações de serviços
      tags:
        - Prestacao de Servico
      description: Retorna uma lista de todas as prestacões de servicos disponíveis
      responses:
        "200":
          description: Lista de prestações de serviços
          content:
          application/json:
            schema:
              type: array
              items:
                $ref: "#/components/schemas/PrestacaoServico"
        "404":
          description: "Nenhuma prestação de serviço encontrado"
          content:
            application/json:
              schema:
                type: object
                $ref: "#/components/schemas/PrestacaoServicoResponseError"

  /prestacao-servico/create:
    post:
      summary: Criar uma nova prestação de serviço
      tags:
        - Prestacao de Servico
      description: Cria uma nova prestação de serviço
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              $ref: "#/components/schemas/CreatePrestacaoServico"
      responses:
        "200":
          description: Prestação de serviço criado com sucesso
          content:
            application/json:
              schema:
                type: object
                $ref: "#/components/schemas/PrestacaoServicoResponseSucess"
        "400":
          description: Dados inválidos
          content:
            application/json:
              schema:
                type:
                $ref: "#/components/schemas/PrestacaoServicoResponseError"

  /prestacao-servico/get-by-id/{id}:
    get:
      summary: Buscar uma prestação de serviço por ID
      tags:
        - Prestacao de Servico
      description: Retorna uma prestação de serviço específico pelo ID
      parameters: 
        - name: id
          in: path
          required: true
          description: ID da prestação de serviço
          schema:
            type: integer
            example: 1
      responses:
        "200":
          description: Prestação de serviço encontrado
          content: 
            application/json:
              schema:
                type: object
                $ref: "#/components/schemas/PrestacaoServicoResponseSucess"
        "404":
          description: Prestação de serviço não encontrado
          content:
            application/json:
              schema:
                type: object
                $ref: "#/components/schemas/PrestacaoServicoResponseError"

  /prestacao-servico/update/{id}:
    put:
      summary: Atualizar uma prestação de serviço
      tags:
        - Prestacao de Servico
      description: Atualiza uma prestação de serviço específico pelo ID
      parameters:
        - name: id
          in: path
          required: true
          description: ID da prestacao de serviço a ser atualizado
          schema:
            type: integer
            example: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              $ref: "#/components/schemas/CreatePrestacaoServico"
      responses:
        "200":
          description: Prestação de serviço atualizado com sucesso
          content: 
            application/json:
              schema:
                type: object
                $ref: "#/components/schemas/PrestacaoServicoResponseSucess"
        "400":
          description: Dados inválidos
          content:
            application/json:
              schema:
                type: object
                $ref: "#/components/schemas/PrestacaoServicoResponseError"
        "404":
          description: Prestação de serviço não encontrado
          content:
            application/json:
              schema:
                type: object
                $ref: "#/components/schemas/PrestacaoServicoResponseError"

  /prestacao-servico/delete/{id}:
    delete:
      summary: Apagar uma prestação de serviço
      tags:
        - Prestacao de Servico
      description: Apaga uma prestação de serviço específico pelo ID
      parameters:
        - name: id
          in: path
          required: true
          description: ID da prestação de servico a ser apagado
          schema:
            type: integer
            example: 1
      responses:
        "200":
          description: Prestação de serviço apagado com sucesso
          content:
            application/json:
              schema:
                type: object
                $ref: "#/components/schemas/PrestacaoServicoResponseSucess"
        "404":
          description: Prestação de serviço não encontrado
          content:
            application/json:
              schema:
                type: object
                $ref: "#/components/schemas/PrestacaoServicoResponseError"

  /prestacao-servico/get-all-detalhado:
    get:
      summary: Buscar todas as prestações de serviço detalhada
      tags:
        - Prestacao de Servico
      description: Retorna uma lista de todas as prestações de serviço específico detalhadas
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: string
            example: "10"
        - name: offset
          in: query
          required: false
          schema:
            type: string
            example: "0"
      responses:
        "200":
          description: Prestação de serviço detalhada encontrada com sucesso
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PrestacaoServicoResponseSucess"
        "500":
          description: Erro ao buscar prestação de serviço detalhada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PrestacaoServicoResponseError"

  /prestacao-servico/get-all-by-categoria/{categoria}:
    get:
      summary:
      tags:
        - Prestacao de Servico
      description:
      parameters:
        - name: categoria
          in: path
          required: true
          schema:
            type: string
            example: "1"
        - name: limit
          in: query
          required: false
          schema:
            type: string
            example: "10"
        - name: offset
          in: query
          required: false
          schema:
            type: string
            example: "0"
      responses:
        "200":
          description: Prestação de serviço por categoria encontrada com sucesso
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PrestacaoServicoResponseSucess"
        "400":
          description: Dados de prestação de serviço por categoria invalidos
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PrestacaoServicoResponseError"
        "500":
          description: Erro ao buscar prestacao de servico por categoria
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PrestacaoServicoResponseError"