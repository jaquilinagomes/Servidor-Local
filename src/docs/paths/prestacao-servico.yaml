# schema/prestacao-servico.yaml

paths:
  /prestacaoservico:
    get:
      summary: Listar todos os prestação serviços
      tags:
        - Prestacao Servico
      description: Retorna uma lista de todos os prestacao servicos disponíveis
      responses:
        "200":
          description: Lista de prestação serviços
          content:
          application/json:
            schema:
              type: array
              items:
                $ref: "#/components/schemas/PrestacaoServico"
        "404":
          description: "Nenhum prestação serviço encontrado"
          content:
            application/json:
              schema:
                type: object
                $ref: "#/components/schemas/PrestacaoServicoResponseError"

  /prestacaoservico/create:
    post:
      summary: Criar um novo prestação serviço
      tags:
        - Prestacao Servico
      description: Cria um novo prestação serviço
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              $ref: "#/components/schemas/CreatePrestacaoServico"
      responses:
        "200":
          description: Prestação serviço criado com sucesso
          content:
            application/json:
              schema:
                type: object
                $ref: "#/components/schemas/PrestacaoServicoResponseSucess"
        "400":
          description: Dados inválidos
          content:
            application/json:
              schema:
                type:
                $ref: "#/components/schemas/PrestacaoServicoResponseError"

  /prestacaoservico/get-by-id/{id}:
    get:
      summary: Buscar um prestação serviço por ID
      tags:
        - Prestacao Servico
      description: Retorna um prestação serviço específico pelo ID
      parameters: 
        - name: id
          in: path
          required: true
          description: ID do prestação serviço
          schema:
            type: integer
            example: 1
      responses:
        "200":
          description: Prestação serviço encontrado
          content: 
            application/json:
              schema:
                type: object
                $ref: "#/components/schemas/PrestacaoServicoResponseSucess"
        "404":
          description: Prestação serviço não encontrado
          content:
            application/json:
              schema:
                type: object
                $ref: "#/components/schemas/PrestacaoServicoResponseError"

  /prestacaoservico/update/{id}:
    put:
      summary: Atualizar um prestação serviço
      tags:
        - Prestacao Servico
      description: Atualiza um prestação serviço específico pelo ID
      parameters:
        - name: id
          in: path
          required: true
          description: ID do prestacao serviço a ser atualizado
          schema:
            type: integer
            example: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              $ref: "#/components/schemas/CreatePrestacaoServico"
      responses:
        "200":
          description: Prestação serviço atualizado com sucesso
          content: 
            application/json:
              schema:
                type: object
                $ref: "#/components/schemas/PrestacaoServicoResponseSucess"
        "400":
          description: Dados inválidos
          content:
            application/json:
              schema:
                type: object
                $ref: "#/components/schemas/PrestacaoServicoResponseError"
        "404":
          description: Prestação serviço não encontrado
          content:
            application/json:
              schema:
                type: object
                $ref: "#/components/schemas/PrestacaoServicoResponseError"

  /prestacaoservico/delete/{id}:
    delete:
      summary: Apagar um prestação serviço
      tags:
        - Prestacao Servico
      description: Apaga um serviço específico pelo ID
      parameters:
        - name: id
          in: path
          required: true
          description: ID do prestação servico a ser apagado
          schema:
            type: integer
            example: 1
      responses:
        "200":
          description: Prestação serviço apagado com sucesso
          content:
            application/json:
              schema:
                type: object
                $ref: "#/components/schemas/PrestacaoServicoResponseSucess"
        "404":
          description: Prestação serviço não encontrado
          content:
            application/json:
              schema:
                type: object
                $ref: "#/components/schemas/PrestacaoServicoResponseError"