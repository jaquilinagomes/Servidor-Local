# paths/users.yaml

paths:
  /users:
    get:
      summary: Listar todos os usuários
      tags:
        - Users
      description: Retorna uma lista de todos os usuários disponíveis
      responses:
        "200":
          description: Lista de usuários
          content:
          application/json:
            schema:
              type: array
              items:
                $ref: "#components/schemas/CreateUsers"
        "404":
          description: "Nenhum usuário encontrado"
          content:
            application/json:
              schema:
                type: object
                $ref: "#components/schemas/UserResponseError"

  /users/create:
    post:
      summary: Criar um novo usuário
      tags:
        - Users
      description: Cria um novo usuário
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              $ref: "#/components/schemas/CreateUsers"
      responses:
        "200":
          description: Usuário criado com sucesso
          content:
            application/json:
              schema:
                type: object
                $ref: "#/components/schemas/UserResponseSucess"
        "400":
          description: Dados inválidos
          content:
            application/json:
              schema:
                type:
                $ref: "#/components/schemas/UserResponseError"

  /users/get-by-id/{id}:
    get:
      summary: Buscar um usuário por ID
      tags:
        - Users
      description: Retorna um usuário específico pelo ID
      parameters:
        - name: id
          in: path
          required: true
          description: ID do usuário
          schema:
            type: integer
            example: 1
      responses:
        "200":
          description: Usuário encontrado
          content:
            application/json:
              schema:
                type: object
                $ref: "#/components/schemas/UserResponseSucess"
        "404":
          description: Usuário não encontrado
          content:
            application/json:
              schema:
                type: object
                $ref: "#/components/schemas/UserResponseError"

  /users/update/{id}:
    put:
      summary: Atualizar um usuário
      tags:
        - Users
      description: Atualiza um usuário específico pelo ID
      parameters:
        - name: id
          in: path
          required: true
          description: ID do usuário a ser atualizado
          schema:
            type: integer
            example: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              $ref: "#/components/schemas/CreateUsers"
      responses:
        "200":
          description: Usuário atualizado com sucesso
          content:
            application/json:
              schema:
                type: object
                $ref: "#/components/schemas/UserResponseSucess"
        "400":
          description: Dados inválidos
          content:
            application/json:
              schema:
                type: object
                $ref: "#/components/schemas/UserResponseError"
        "404":
          description: Usuário não encontrado
          content:
            application/json:
              schema:
                type: object
                $ref: "#/components/schemas/UserResponseError"

  /users/update-password/{id}:
    put:
      summary: Atualizar senha de um usuário
      tags:
        - Users
      description: Atualiza senha de um usuário pelo ID
      parameters:
        - name: id
          in: path
          required: true
          description: ID do usuário a ser atualizado
          schema:
            type: integer
            example: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              $ref: "#/components/schemas/UpdatePassword"
      responses:
        "200":
          description: Senha do usuário atualizado com sucesso
          content:
            application/json:
              schema:
                type: object
                $ref: "#/components/schemas/UserResponseSucess"
        "400":
          description: Dados inválidos
          content:
            application/json:
              schema:
                type: object
                $ref: "#/components/schemas/UserResponseError"
        "404":
          description: Usuário não encontrado
          content:
            application/json:
              schema:
                type: object
                $ref: "#/components/schemas/UserResponseError"

  /users/delete/{id}:
    delete:
      summary: Apagar um usuário
      tags:
        - Users
      description: Apaga um usuário específico pelo ID
      parameters:
        - name: id
          in: path
          required: true
          description: ID do usuário a ser apagado
          schema:
            type: integer
            example: 1
      responses:
        "200":
          description: Usuário apagado com sucesso
          content:
            application/json:
              schema:
                type: object
                $ref: "#/components/schemas/UserResponseSucess"
        "404":
          description: Usuário não encontrado
          content:
            application/json:
              schema:
                type: object
                $ref: "#/components/schemas/UserResponseError"

  /users/login:
    post:
      summary: Login de um usuário
      tags:
        - Users
      description: Faz login de um usuário
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginUser"
      responses:
        "200":
          description: Usuário logado com sucesso
          content:
            application/json:
              schema:
                type: object
                $ref: "#/components/schemas/UserResponseSucess"
        "404":
          description: "Usuário não encontrado"
          content:
            application/json:
              schema:
                type: object
                $ref: "#/components/schemas/UserResponseError"
        "400":
          description: "Erro ao logar usuário"
          content:
            application/json:
              schema:
                type: object
                $ref: "#/components/schemas/UserResponseError"