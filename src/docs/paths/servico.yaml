# paths/servico.yaml

paths:
  /service:
    get:
      summary: Listar tosdos os serviços
      description: Retorna uma lista de todos os servicos disponíveis
      responses:
        "200":
          description: Lista de serviços
          content:
          application/json:
            schema:
              type: array
              items:
                $ref: "#/components/schemas/servico"
        "404":
          description: "Nenhum serviço encontrado"
          content:
            application/json:
              schema:
                type: object
                $ref: "#/components/schemas/ResponseError"
  /service/create:
    post:
      summary: Criar um novo serviço
      description: Cria um novo serviço
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties: