# paths/orcamento.yaml

paths:
  /orcamento:
    get:
      summary: Listar todos os orçamentos
      tags:
        - Orcamento
      description: Retorna uma lista de todos os orçamentos disponíveis
      responses:
        "200":
          description: Lista de orçamentos
          content:
          application/json:
            schema:
              type: array
              items:
                $ref: "#/components/schemas/Orcamento"
        "404":
          description: "Nenhum orçamento encontrado"
          content:
            application/json:
              schema:
                type: object
                $ref: "#/components/schemas/OrcamentoResponseError"

  /orcamento/create:
    post:
      summary: Criar um novo orçamento
      tags:
        - Orcamento
      description: Cria um novo orçamento
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              $ref: "#/components/schemas/CreateOrcamento"
      responses:
        "200":
          description: Orçamento criado com sucesso
          content:
            application/json:
              schema:
                type: object
                $ref: "#/components/schemas/OrcamentoResponseSuccess"
        "400":
          description: Dados inválidos
          content:
            application/json:
              schema:
                type:
                $ref: "#/components/schemas/OrcamentoResponseError"

  /orcamento/get-by-id/{id}:
    get:
      summary: Buscar um orçamento por ID
      tags:
        - Orcamento
      description: Retorna um orçamento específico pelo ID
      parameters: 
        - name: id
          in: path
          required: true
          description: ID do orçamento
          schema:
            type: integer
            example: 1
      responses:
        "200":
          description: Orçamento encontrado
          content: 
            application/json:
              schema:
                type: object
                $ref: "#/components/schemas/OrcamentoResponseSuccess"
        "404":
          description: Orçamento não encontrado
          content:
            application/json:
              schema:
                type: object
                $ref: "#/components/schemas/OrcamentoResponseError"

  /orcamento/calcular/:id:
    put:
      summary: Calcular um orçamento
      tags:
        - Orcamento
      description: Calcular um orçamento específico pelo ID
      parameters:
        - name: id
          in: path
          required: true
          description: ID do orçamento a ser calculado
          schema:
            type: integer
            example: 1
      responses:
        "200":
          description: Orçamento calculado com sucesso
          content: 
            application/json:
              schema:
                type: object
                $ref: "#/components/schemas/OrcamentoResponseSuccess"
        "400":
          description: Dados inválidos
          content:
            application/json:
              schema:
                type: object
                $ref: "#/components/schemas/OrcamentoResponseError"
        "404":
          description: Orçamento não encontrado
          content:
            application/json:
              schema:
                type: object
                $ref: "#/components/schemas/OrcamentoResponseError"

  /orcamento/update/{id}:
    put:
      summary: Atualizar um orçamento
      tags:
        - Orcamento
      description: Atualiza um orçamento específico pelo ID
      parameters:
        - name: id
          in: path
          required: true
          description: ID do orçamento a ser atualizado
          schema:
            type: integer
            example: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              $ref: "#/components/schemas/CreateOrcamento"
      responses:
        "200":
          description: Orçamento atualizado com sucesso
          content: 
            application/json:
              schema:
                type: object
                $ref: "#/components/schemas/OrcamentoResponseSuccess"
        "400":
          description: Dados inválidos
          content:
            application/json:
              schema:
                type: object
                $ref: "#/components/schemas/OrcamentoResponseError"
        "404":
          description: Orçamento não encontrado
          content:
            application/json:
              schema:
                type: object
                $ref: "#/components/schemas/OrcamentoResponseError"

  /orcamento/delete/{id}:
    delete:
      summary: Apagar um orçamemto
      tags:
        - Orcamento
      description: Apaga um orçamento específico pelo ID
      parameters:
        - name: id
          in: path
          required: true
          description: ID do orçamento a ser apagado
          schema:
            type: integer
            example: 1
      responses:
        "200":
          description: Orçamento apagado com sucesso
          content:
            application/json:
              schema:
                type: object
                $ref: "#/components/schemas/OrcamentoResponseSuccess"
        "404":
          description: Orçamento não encontrado
          content:
            application/json:
              schema:
                type: object
                $ref: "#/components/schemas/OrcamentoResponseError"