# schema/proposta.yaml

paths:
  /proposta:
    get:
      summary: Listar todas as propostas
      tags:
        - Proposta
      description: Retorna uma lista de todas as propostas disponíveis
      responses:
        "200":
          description: Lista de propostas
          content:
          application/json:
            schema:
              type: array
              items:
                $ref: "#/components/schemas/Proposta"
        "404":
          description: "Nenhuma proposta encontrada"
          content:
            application/json:
              schema:
                type: object
                $ref: "#/components/schemas/PropostaResponseError"

  /proposta/create:
    post:
      summary: Criar uma nova proposta
      tags:
        - Proposta
      description: Cria uma nova proposta
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              $ref: "#/components/schemas/CreateProposta"
      responses:
        "200":
          description: Proposta criada com sucesso
          content:
            application/json:
              schema:
                type: object
                $ref: "#/components/schemas/PropostaResponseSucess"
        "400":
          description: Dados inválidos
          content:
            application/json:
              schema:
                type:
                $ref: "#/components/schemas/PropostaResponseError"

  /proposta/get-by-id/{id}:
    get:
      summary: Buscar uma proposta por ID
      tags:
        - Proposta
      description: Retorna uma proposta específica pelo ID
      parameters: 
        - name: id
          in: path
          required: true
          description: ID da proposta
          schema:
            type: integer
            example: 1
      responses:
        "200":
          description: Proposta encontrada
          content: 
            application/json:
              schema:
                type: object
                $ref: "#/components/schemas/PropostaResponseSucess"
        "404":
          description: Proposta não encontrada
          content:
            application/json:
              schema:
                type: object
                $ref: "#/components/schemas/PropostaResponseError"

  /proposta/update/{id}:
    put:
      summary: Atualizar uma proposta
      tags:
        - Proposta
      description: Atualiza uma proposta específica pelo ID
      parameters:
        - name: id
          in: path
          required: true
          description: ID da proposta a ser atualizada
          schema:
            type: integer
            example: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              $ref: "#/components/schemas/CreateProposta"
      responses:
        "200":
          description: Proposta atualizada com sucesso
          content: 
            application/json:
              schema:
                type: object
                $ref: "#/components/schemas/PropostaResponseSucess"
        "400":
          description: Dados inválidos
          content:
            application/json:
              schema:
                type: object
                $ref: "#/components/schemas/PropostaResponseError"
        "404":
          description: Proposta não encontrada
          content:
            application/json:
              schema:
                type: object
                $ref: "#/components/schemas/PropostaResponseError"

  /proposta/delete/{id}:
    delete:
      summary: Apagar uma proposta
      tags:
        - Proposta
      description: Apaga uma proposta específica pelo ID
      parameters:
        - name: id
          in: path
          required: true
          description: ID da proposta a ser apagada
          schema:
            type: integer
            example: 1
      responses:
        "200":
          description: Proposta apagada com sucesso
          content:
            application/json:
              schema:
                type: object
                $ref: "#/components/schemas/PropostaResponseSucess"
        "404":
          description: Proposta não encontrada
          content:
            application/json:
              schema:
                type: object
                $ref: "#/components/schemas/PropostaResponseError"